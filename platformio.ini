; PlatformIO Project Configuration File
; ESP32-Dashboard (refactored)

[platformio]
default_envs = nm-display-420

; ─── Common options shared by all environments ───
[env]
platform = espressif32 @ 6.13.0
framework = arduino
build_unflags = -std=gnu++11
build_flags =
    -Wall
    -std=gnu++17
    -Isrc
lib_deps =
    bblanchon/ArduinoJson @ 7.4.3
    zinggjm/GxEPD2 @ 1.6.8
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

; ─── NM Display 420 (LilyGo T-Display-S3 + 4.2" 3-color EPD) ───
[env:nm-display-420]
board = lilygo-t-display-s3
monitor_speed = 115200
board_build.partitions = partition/partitions_16mb_ota.csv
board_upload.flash_size = 16MB
board_build.filesystem = littlefs
extra_scripts = post:extra_script_fs.py
board_build.flash_mode = dio
board_build.f_cpu = 80000000L
build_src_filter =
    +<*>
    -<bsp/>                         +<bsp/nm_display_420/>
    -<ui/layouts/>                  +<ui/layouts/epd_400x300/>
build_flags =
    ${env.build_flags}
    -DLED_BUILTIN=47
    -DUI_LAYOUT_EPD_400x300
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit AHTX0 @ 2.0.5
    adafruit/Adafruit BusIO @ 1.17.4
    adafruit/Adafruit Unified Sensor @ 1.1.15

; ─── DFRobot FireBeetle 2 ESP32-E + 7.5" BW EPD (800×480) ───
[env:dfrobot_firebeetle2_esp32e]
board = dfrobot_firebeetle2_esp32e
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.f_cpu = 80000000L
build_src_filter =
    +<*>
    -<bsp/>                         +<bsp/firebeetle2_esp32e/>
    -<ui/layouts/>                  +<ui/layouts/epd_800x480/>
build_flags =
    ${env.build_flags}
    -DUI_LAYOUT_EPD_800x480
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit BME280 Library @ 2.3.0
    adafruit/Adafruit BusIO @ 1.17.4
    adafruit/Adafruit Unified Sensor @ 1.1.15

; ─── DFRobot FireBeetle ESP32 (micro-USB) + 7.5" BW EPD (800×480) ───
[env:firebeetle32]
board = firebeetle32
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.f_cpu = 80000000L
build_src_filter =
    +<*>
    -<bsp/>                         +<bsp/firebeetle32/>
    -<ui/layouts/>                  +<ui/layouts/epd_800x480/>
build_flags =
    ${env.build_flags}
    -DUI_LAYOUT_EPD_800x480
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit BME280 Library @ 2.3.0
    adafruit/Adafruit BusIO @ 1.17.4
    adafruit/Adafruit Unified Sensor @ 1.1.15
